<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Space Background matching the OLED theme -->
  <rect width="512" height="512" rx="128" fill="#0E0916" />
  
  <defs>
    <!-- Primary vibrant gradient for the app -->
    <linearGradient id="gradient-primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/> <!-- Violet 500 -->
      <stop offset="50%" stop-color="#D946EF"/> <!-- Fuchsia 500 -->
      <stop offset="100%" stop-color="#F59E0B"/> <!-- Amber 500 -->
    </linearGradient>

    <!-- Subtle backdrop glow -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#D946EF" stop-opacity="0.3" />
    </linearGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Glowing Aura behind the monogram -->
  <circle cx="256" cy="256" r="120" fill="url(#glow)" filter="url(#blur-glow)" />

  <!-- Premium 'I' Monogram container / Abstract News Fold -->
  <rect x="180" y="140" width="152" height="232" rx="40" fill="url(#gradient-primary)" />
  
  <!-- The glassmorphism cutout effect inside the 'I' -->
  <rect x="210" y="250" width="30" height="92" rx="15" fill="#FFFFFF" fill-opacity="0.9" />
  <circle cx="225" cy="180" r="15" fill="#FFFFFF" fill-opacity="0.9" />

  <!-- Dynamic swoosh / News Pulse accent in Amber -->
  <path d="M280 200 A 70 70 0 0 1 350 130 L 350 100 A 100 100 0 0 0 250 200 Z" fill="#F59E0B" />
  <path d="M280 200 A 70 70 0 0 1 350 270 L 350 300 A 100 100 0 0 0 250 200 Z" fill="#F59E0B" />

</svg>
